name: Cppcheck Analysis

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  cppcheck:
    name: Run Cppcheck
    runs-on: ubuntu-latest  # You can also use windows-latest or macos-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install cppcheck
      - name: Install Cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      # Step 3: Run cppcheck
      - name: Run static analysis
        run: |
          cppcheck --enable=style --quiet --error-exitcode=1 lib/ -I lib/include

      # Step 4: Upload cppcheck report (optional)
      - name: Save cppcheck report
        if: always()
        run: |
          cppcheck --enable=style --inconclusive --xml --xml-version=2 lib/ -I lib/include 2> cppcheck-report.xml
        continue-on-error: true

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cppcheck-report
          path: cppcheck-report.xml
