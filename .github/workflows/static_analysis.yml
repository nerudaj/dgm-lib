name: Static-Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BUILD_DIR: ${{github.workspace}}/vsbuild

jobs:
  build:
    runs-on: windows-2022
    strategy:
      matrix:
        configure_args: [ "", "-D ENABLE_LEGACY_ANIMATION=OFF" ]

    steps:
    - uses: actions/checkout@v4

    - name: Setup cmake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '4.0.3'

    - name: Check cmake version
      run: cmake --version

    - name: Configure CMake
      run: |
        mkdir "${{env.BUILD_DIR}}"
        cd "${{env.BUILD_DIR}}"
        cmake -D ENABLE_LINTER=ON ${{ matrix.configure_args }} ..
      shell: cmd

    - name: Build
      working-directory: ${{env.BUILD_DIR}}
      run: |
        cmake --build . --config Debug
      shell: cmd

    - name: Install cppcheck
      run: |
        winget install -e --id Cppcheck.Cppcheck
      shell: cmd

    - name: Cppcheck
      working-directory: ${{github.workspace}}
      run: |
        cppcheck ./lib/src \
        -I ./lib/include/ \
        --enable=all \
        --suppress=unusedFunction \
        --suppress=missingIncludeSystem
      shell: cmd