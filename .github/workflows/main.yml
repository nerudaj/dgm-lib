name: CI-Windows-MSVC

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  BUILD_DIR: ${{github.workspace}}/vsbuild

jobs:
  build:
    runs-on: windows-2022
    strategy:
      matrix:
        configure_args: [ "", "-D DGM_ENABLE_LEGACY_ANIMATION=OFF" ]

    steps:
    - uses: actions/checkout@v4

    - name: Setup cmake
      uses: jwlawson/actions-setup-cmake@v2
      with:
        cmake-version: '4.0.3'

    - name: Check cmake version
      run: cmake --version

    - name: Configure CMake
      run: |
        cmake -B "${{env.BUILD_DIR}}" ${{matrix.configure_args}} -D CMAKE_CXX_STANDARD=23 -D CMAKE_CXX_STANDARD_REQUIRED=ON -D CMAKE_GENERATOR_PLATFORM=x64 .
      shell: cmd

    - name: Build
      run: |
        cmake --build ${{env.BUILD_DIR}} --config Debug
        cmake --build ${{env.BUILD_DIR}} --config Release
      shell: cmd

    - name: Test
      working-directory: ${{env.BUILD_DIR}}
      run: |
        ctest -C Debug --output-on-failure
        ctest -C Release --output-on-failure
      shell: cmd
